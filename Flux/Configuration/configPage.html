<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Flux - Xtream Codes Client</title>
</head>
<body>
<div id="FluxConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
    <div data-role="content">
        <div class="content-primary">

            <form id="FluxConfigForm">
                <h2 style="margin-top:0">Flux — Xtream Codes Client</h2>

                <!-- Providers -->
                <div class="verticalSection">
                    <h3 class="checkboxListLabel">Providers</h3>
                    <div id="providerList" style="margin-bottom:1em"></div>
                    <button id="btnAddProvider" type="button" class="raised button-submit emby-button">
                        <span>Add Provider</span>
                    </button>
                </div>

                <!-- Add/Edit form -->
                <div id="providerForm" style="display:none;border:1px solid var(--neutral-border-color,#444);border-radius:4px;padding:1.5em;margin-top:1em">
                    <h3 id="providerFormTitle" style="margin-top:0">Add Provider</h3>
                    <input type="hidden" id="providerId" />
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="displayName">Display Name</label>
                        <input id="displayName" type="text" class="emby-input" required placeholder="My IPTV" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="baseUrl">Provider URL</label>
                        <input id="baseUrl" type="text" class="emby-input" required placeholder="http://provider.example:8080" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="username">Username</label>
                        <input id="username" type="text" class="emby-input" autocomplete="off" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="password">Password</label>
                        <input id="password" type="password" class="emby-input" autocomplete="new-password" />
                        <div class="fieldDescription">Leave blank to keep existing password when editing.</div>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="userAgent">User-Agent (optional)</label>
                        <input id="userAgent" type="text" class="emby-input" placeholder="Flux/1.0" />
                    </div>
                    <div style="margin-top:1em;display:flex;gap:.5em;flex-wrap:wrap">
                        <button id="btnTestConnection" type="button" class="raised emby-button"><span>Test Connection</span></button>
                        <button id="btnSaveProvider" type="button" class="raised button-submit emby-button"><span>Save Provider</span></button>
                        <button id="btnCancelProvider" type="button" class="raised emby-button"><span>Cancel</span></button>
                    </div>
                    <div id="testResult" style="margin-top:.75em;font-weight:bold"></div>
                </div>

                <!-- Refresh Intervals -->
                <div class="verticalSection" style="margin-top:2em">
                    <h3 class="checkboxListLabel">Refresh Intervals</h3>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="liveRefreshHours">Live Channels (hours)</label>
                        <input id="liveRefreshHours" type="number" class="emby-input" min="1" max="168" value="12" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="epgRefreshHours">EPG Guide (hours)</label>
                        <input id="epgRefreshHours" type="number" class="emby-input" min="1" max="168" value="6" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="vodRefreshHours">VOD Catalog (hours)</label>
                        <input id="vodRefreshHours" type="number" class="emby-input" min="1" max="168" value="24" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="seriesRefreshHours">Series Catalog (hours)</label>
                        <input id="seriesRefreshHours" type="number" class="emby-input" min="1" max="168" value="24" />
                    </div>
                </div>

                <!-- Manual Refresh -->
                <div class="verticalSection" style="margin-top:1.5em">
                    <h3 class="checkboxListLabel">Manual Refresh</h3>
                    <div style="display:flex;gap:.5em;flex-wrap:wrap;margin-bottom:.5em">
                        <button type="button" class="raised emby-button btnManualRefresh" data-task="FluxSyncLive"><span>Refresh Live + EPG</span></button>
                        <button type="button" class="raised emby-button btnManualRefresh" data-task="FluxSyncVod"><span>Refresh VOD</span></button>
                        <button type="button" class="raised emby-button btnManualRefresh" data-task="FluxSyncSeries"><span>Refresh Series</span></button>
                    </div>
                    <div id="refreshStatus" style="font-size:.85em;color:var(--text-color-secondary,#aaa)"></div>
                </div>

                <!-- Health -->
                <div class="verticalSection" style="margin-top:1.5em">
                    <h3 class="checkboxListLabel">Provider Health</h3>
                    <div id="healthPanel" style="font-size:.9em"></div>
                </div>

                <div style="margin-top:2em">
                    <button type="submit" class="raised button-submit emby-button"><span>Save Settings</span></button>
                </div>
            </form>
        </div>
    </div>

    <script type="text/javascript">
    (function () {
        'use strict';
        var ApiClient = window.ApiClient;
        var PLUGIN_ID = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';

        function escHtml(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function uuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }
        function showMsg(elId, text, ok) {
            var el = document.getElementById(elId);
            el.textContent = text;
            el.style.color = ok ? 'green' : '#c00';
        }
        function renderProviders(providers) {
            var list = document.getElementById('providerList');
            if (!providers || !providers.length) {
                list.innerHTML = '<p style="color:var(--text-color-secondary,#aaa)">No providers configured.</p>';
                return;
            }
            list.innerHTML = providers.map(function(p) {
                var hColor = {Ok:'green',Degraded:'orange',Failed:'red'}[p.Health] || '#888';
                return '<div style="display:flex;align-items:center;gap:.5em;margin-bottom:.5em">'
                    + '<span style="flex:1"><strong>' + escHtml(p.DisplayName) + '</strong> — ' + escHtml(p.BaseUrl)
                    + ' &nbsp;<em style="font-size:.85em;color:' + hColor + '">' + escHtml(p.Health || 'Unknown') + '</em></span>'
                    + '<button type="button" class="emby-button raised btnEditProvider" data-id="' + escHtml(p.Id) + '" style="padding:.25em .75em">Edit</button>'
                    + '<button type="button" class="emby-button raised btnRemoveProvider" data-id="' + escHtml(p.Id) + '" style="padding:.25em .75em">Remove</button>'
                    + '</div>';
            }).join('');
            list.querySelectorAll('.btnEditProvider').forEach(function(b) {
                b.addEventListener('click', function() { editProvider(b.dataset.id); });
            });
            list.querySelectorAll('.btnRemoveProvider').forEach(function(b) {
                b.addEventListener('click', function() { removeProvider(b.dataset.id); });
            });
        }
        function loadConfig() {
            ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg) {
                renderProviders(cfg.Providers || []);
                document.getElementById('liveRefreshHours').value = cfg.LiveChannelRefreshHours || 12;
                document.getElementById('epgRefreshHours').value = cfg.EpgRefreshHours || 6;
                document.getElementById('vodRefreshHours').value = cfg.VodRefreshHours || 24;
                document.getElementById('seriesRefreshHours').value = cfg.SeriesRefreshHours || 24;
                renderHealth(cfg.Providers || []);
            });
        }
        function saveGlobalConfig() {
            ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg) {
                cfg.LiveChannelRefreshHours = parseInt(document.getElementById('liveRefreshHours').value, 10) || 12;
                cfg.EpgRefreshHours = parseInt(document.getElementById('epgRefreshHours').value, 10) || 6;
                cfg.VodRefreshHours = parseInt(document.getElementById('vodRefreshHours').value, 10) || 24;
                cfg.SeriesRefreshHours = parseInt(document.getElementById('seriesRefreshHours').value, 10) || 24;
                ApiClient.updatePluginConfiguration(PLUGIN_ID, cfg).then(function() {
                    if (window.Dashboard && Dashboard.processPluginConfigurationUpdateResult) {
                        Dashboard.processPluginConfigurationUpdateResult();
                    }
                });
            });
        }
        function showProviderForm(p) {
            document.getElementById('providerForm').style.display = '';
            document.getElementById('providerFormTitle').textContent = p ? 'Edit Provider' : 'Add Provider';
            document.getElementById('providerId').value = p ? p.Id : uuid();
            document.getElementById('displayName').value = p ? p.DisplayName : '';
            document.getElementById('baseUrl').value = p ? p.BaseUrl : '';
            document.getElementById('username').value = p ? p.Username : '';
            document.getElementById('password').value = '';
            document.getElementById('userAgent').value = p ? (p.UserAgent || 'Flux/1.0') : 'Flux/1.0';
            document.getElementById('testResult').textContent = '';
        }
        function hideProviderForm() {
            document.getElementById('providerForm').style.display = 'none';
        }
        function editProvider(id) {
            ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg) {
                var p = (cfg.Providers || []).find(function(x) { return x.Id === id; });
                if (p) showProviderForm(p);
            });
        }
        function removeProvider(id) {
            if (!confirm('Remove this provider? Its cached data will be cleared on next sync.')) return;
            ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg) {
                cfg.Providers = (cfg.Providers || []).filter(function(p) { return p.Id !== id; });
                ApiClient.updatePluginConfiguration(PLUGIN_ID, cfg).then(loadConfig);
            });
        }
        function saveProvider() {
            var id = document.getElementById('providerId').value;
            var pw = document.getElementById('password').value;
            ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg) {
                var providers = cfg.Providers || [];
                var existing = providers.find(function(p) { return p.Id === id; });
                var provider = {
                    Id: id,
                    DisplayName: document.getElementById('displayName').value.trim(),
                    BaseUrl: document.getElementById('baseUrl').value.trim().replace(/\/$/, ''),
                    Username: document.getElementById('username').value.trim(),
                    EncryptedPassword: pw ? btoa(unescape(encodeURIComponent(pw))) : (existing ? existing.EncryptedPassword : ''),
                    UserAgent: document.getElementById('userAgent').value.trim() || 'Flux/1.0',
                    Health: existing ? existing.Health : 'Unknown',
                    EnabledCategoryIds: existing ? existing.EnabledCategoryIds : []
                };
                if (existing) {
                    providers[providers.indexOf(existing)] = provider;
                } else {
                    providers.push(provider);
                }
                cfg.Providers = providers;
                ApiClient.updatePluginConfiguration(PLUGIN_ID, cfg).then(function() {
                    hideProviderForm();
                    loadConfig();
                });
            });
        }
        function testConnection() {
            showMsg('testResult', 'Testing…', true);
            var base = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
            var u = encodeURIComponent(document.getElementById('username').value.trim());
            var p = encodeURIComponent(document.getElementById('password').value);
            fetch(base + '/player_api.php?username=' + u + '&password=' + p)
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d && d.user_info && d.user_info.auth == 1) {
                        var info = d.user_info;
                        var exp = info.exp_date ? new Date(parseInt(info.exp_date, 10) * 1000).toLocaleDateString() : 'N/A';
                        showMsg('testResult',
                            '✓ Connected  Status: ' + (info.status || '?') +
                            '  Expires: ' + exp + '  Max conn: ' + (info.max_connections || '?'), true);
                    } else {
                        showMsg('testResult', '✗ Auth failed — check credentials or account status', false);
                    }
                })
                .catch(function(e) { showMsg('testResult', '✗ Network error: ' + e.message, false); });
        }
        function triggerTask(key) {
            ApiClient.ajax({ type: 'POST', url: ApiClient.getUrl('ScheduledTasks/Running/' + encodeURIComponent(key)) })
                .then(function() {
                    document.getElementById('refreshStatus').textContent =
                        'Triggered at ' + new Date().toLocaleTimeString() + '. Monitor server logs for progress.';
                })
                .catch(function() {
                    document.getElementById('refreshStatus').textContent =
                        'Failed to trigger — is the Flux plugin loaded?';
                });
        }
        function renderHealth(providers) {
            var panel = document.getElementById('healthPanel');
            if (!providers.length) { panel.textContent = 'No providers configured.'; return; }
            panel.innerHTML = providers.map(function(p) {
                var c = {Ok:'green',Degraded:'orange',Failed:'red'}[p.Health] || '#888';
                return '<div style="margin-bottom:.4em"><strong>' + escHtml(p.DisplayName) + '</strong>: '
                    + '<span style="color:' + c + '">' + escHtml(p.Health || 'Unknown') + '</span>'
                    + (p.LastError ? ' &mdash; ' + escHtml(p.LastError) : '') + '</div>';
            }).join('');
        }
        var page = document.getElementById('FluxConfigPage');
        page.addEventListener('pageshow', loadConfig);
        document.getElementById('btnAddProvider').addEventListener('click', function() { showProviderForm(null); });
        document.getElementById('btnSaveProvider').addEventListener('click', saveProvider);
        document.getElementById('btnCancelProvider').addEventListener('click', hideProviderForm);
        document.getElementById('btnTestConnection').addEventListener('click', testConnection);
        document.querySelectorAll('.btnManualRefresh').forEach(function(b) {
            b.addEventListener('click', function() { triggerTask(b.dataset.task); });
        });
        document.getElementById('FluxConfigForm').addEventListener('submit', function(e) {
            e.preventDefault();
            saveGlobalConfig();
        });
    }());
    </script>
</div>
</body>
</html>
